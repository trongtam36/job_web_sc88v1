<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SECURITY SYSTEM - ULTIMATE HUD</title>
    <link rel="dns-prefetch" href="https://script.google.com">
    <link rel="preconnect" href="https://script.google.com" crossorigin>
    <style>
        :root {
            --cyan-glow: #00f2ff;
            --alert-red: #ff003c;
            --win-green: #00ff66;
            --panel-bg: rgba(0, 8, 12, 0.95);
            --border-base: rgba(0, 242, 255, 0.3); 
            --hud-font: 'Consolas', 'Courier New', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--hud-font); -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #000; color: var(--cyan-glow); min-height: 100vh; overflow-x: hidden; overflow-y: auto;
            display: flex; justify-content: center; align-items: center; padding: 20px 0 80px 0;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.4; pointer-events: none; }

        /* --- PHONG CÁCH HUD PANEL MỚI --- */
        .neon-panel {
            background: var(--panel-bg); border: 1px solid var(--border-base); border-radius: 4px;
            position: relative; box-shadow: inset 0 0 15px rgba(0, 242, 255, 0.05);
            overflow: hidden;
        }
        /* Góc cắt trang trí HUD */
        .neon-panel::before {
            content: ''; position: absolute; top: 0; left: 0; width: 20px; height: 2px; background: var(--cyan-glow); box-shadow: 0 0 10px var(--cyan-glow);
        }
        .neon-panel::after {
            content: ''; position: absolute; bottom: 0; right: 0; width: 2px; height: 20px; background: var(--cyan-glow); box-shadow: 0 0 10px var(--cyan-glow);
        }
        
        .neon-content { position: relative; z-index: 3; height: 100%; display: flex; flex-direction: column; padding: 20px; }

        /* --- TIÊU ĐỀ GLITCH VÀ HUD --- */
        .main-header-text {
            text-align: center; font-size: 2.4em; font-weight: bold; letter-spacing: 8px; text-transform: uppercase;
            background: linear-gradient(90deg, #fff, var(--cyan-glow), #fff); background-size: 80% auto;
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--cyan-glow));
            animation: textShine 3s linear infinite, glitch 10s step-end infinite;
            margin-bottom: 25px;
        }
        @keyframes textShine { to { background-position: 200% center; } }
        @keyframes glitch { 0%, 90% { transform: none; } 91% { transform: skew(2deg); filter: drop-shadow(3px 0 red); } 92% { transform: skew(-2deg); filter: drop-shadow(-3px 0 blue); } 93% { transform: none; } }

        #gateway { width: 480px; max-width: 95vw; padding: 10px; z-index: 100; transition: all 0.4s ease; }
        #mainDashboard { display: none; width: 98vw; min-height: 90vh; gap: 20px; opacity: 0; transition: opacity 0.6s ease; flex-direction: row; }
        .fade-in-active { display: flex !important; opacity: 1 !important; transform: scale(1) translateY(0) !important; }

        /* --- BỐ CỤC ĐỐI XỨNG TUYỆT ĐỐI --- */
        .control-panel { flex: 3.2; min-width: 350px; display: flex; flex-direction: column; justify-content: space-between; }
        .system-logs-container { flex: 6.8; display: flex; flex-direction: column; gap: 20px; }
        .log-row { display: flex; flex: 1; gap: 20px; min-height: 300px; flex-wrap: nowrap; }

        .input-box {
            width: 100%; padding: 16px; background: rgba(0, 15, 25, 0.8); border: 1px solid var(--cyan-glow);
            color: var(--cyan-glow); border-radius: 2px; outline: none; text-align: center; font-size: 16px; margin-bottom: 12px;
            box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.1); transition: 0.3s;
        }
        .input-box:focus { background: rgba(0, 30, 45, 0.9); box-shadow: 0 0 15px var(--cyan-glow); }

        .btn-prime {
            width: 100%; padding: 16px; background: transparent; border: 1px solid var(--cyan-glow);
            color: var(--cyan-glow); font-weight: bold; cursor: pointer; transition: 0.3s; letter-spacing: 2px; text-transform: uppercase;
        }
        .btn-prime:hover:not(:disabled) { background: var(--cyan-glow); color: #000; box-shadow: 0 0 25px var(--cyan-glow); }

        .log-panel { flex: 1; padding: 0; border: 1px solid rgba(0, 242, 255, 0.15); }
        .log-title { 
            background: rgba(0, 242, 255, 0.1); padding: 10px; font-size: 0.85em; font-weight: bold; 
            text-align: center; color: #fff; letter-spacing: 2px; border-bottom: 1px solid var(--border-base);
        }
        .log-content { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 15px; 
            font-size: 1em; 
            line-height: 1.8; 
            /* Đặt chiều cao cố định để khung không bị giãn */
            height: 250px; 
            max-height: 250px; 
            /* Ẩn thanh cuộn để giữ thẩm mỹ Cyberpunk */
             scrollbar-width: none; 
}
        .log-content::-webkit-scrollbar { display: none; }

        .status-box { 
            background: rgba(0, 242, 255, 0.05); padding: 20px; border-radius: 4px; 
            border: 1px solid rgba(0, 242, 255, 0.15); margin-bottom: 15px;
            border-left: 4px solid var(--cyan-glow);
        }
        .status-line { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.9em; }

        /* --- STYLE THÔNG BÁO LỚN RÕ NÉT --- */
        .feed-line { padding: 10px 0; border-bottom: 1px solid rgba(0,242,255,0.08); color: #fff; font-weight: 500; font-size: 1.1em; }
        .feed-line b { color: var(--cyan-glow); text-shadow: 0 0 5px var(--cyan-glow); }
        .win-text { color: var(--win-green) !important; font-weight: bold; }
        .feed-dot { color: var(--win-green); margin-right: 10px; font-size: 0.8em; }

        .result-line { padding: 12px; border-radius: 2px; margin-bottom: 10px; border-left: 4px solid transparent; background: rgba(255,255,255,0.03); }
        .res-success { border-color: var(--win-green); color: var(--win-green); }
        .res-fail { border-color: var(--alert-red); color: var(--alert-red); }

        /* --- DEVICE INFO FOOTER GỌN GÀNG --- */
        .device-info-wrapper {
            display: flex; justify-content: center; align-items: center;
            margin-top: 15px; padding: 12px 5px; border: 1px solid var(--cyan-glow);
            border-radius: 4px; background: rgba(0, 10, 15, 0.9); gap: 15px; flex-wrap: nowrap;
        }
        .device-box { display: flex; align-items: center; gap: 5px; font-size: 0.75em; white-space: nowrap; }
        .dev-label { color: var(--cyan-glow); opacity: 0.7; font-weight: bold; }
        .dev-val { color: #fff; font-weight: bold; text-shadow: 0 0 5px var(--cyan-glow); }
        .dev-divider { width: 1px; height: 12px; background: var(--border-base); }

        #fetchingOverlay {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 450px; max-width: 90vw; background: rgba(0, 5, 8, 0.98); border: 2px solid var(--cyan-glow);
            border-radius: 8px; padding: 30px; text-align: center; z-index: 10000; box-shadow: 0 0 60px rgba(0, 242, 255, 0.4);
        }

        @media screen and (max-width: 992px) {
            #mainDashboard { flex-direction: column; height: auto; padding-bottom: 100px; gap: 20px; }
            .log-row { flex-direction: row !important; min-height: 280px; gap: 10px; }
            body { height: auto; overflow-y: auto; align-items: flex-start; padding-top: 10px; }
            .control-panel { min-width: 100%; padding: 20px 15px; }
            .device-info-wrapper { position: fixed; bottom: 0; left: 0; right: 0; margin-top: 0; border-radius: 0; border-left: 0; border-right: 0; border-bottom: 0; z-index: 9999; background: rgba(0, 5, 10, 0.98); border-top: 1px solid var(--cyan-glow); padding: 18px 5px; display: flex !important; justify-content: space-evenly; }
            .device-box { font-size: 0.65em; }
            .dev-divider { display: none; }
        }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <div id="fetchingOverlay">
        <div style="font-weight: bold; letter-spacing: 3px; color: #fff; border-bottom: 1px solid var(--cyan-glow); padding-bottom: 10px;">HỆ THỐNG ĐANG PHÂN TÍCH</div>
        <div id="fetchLog" style="height: 140px; overflow-y: auto; font-size: 0.9em; text-align: left; padding: 12px; background: rgba(0,0,0,0.6); margin: 20px 0; color: var(--cyan-glow); border: 1px solid rgba(0,242,255,0.15);"></div>
        <div id="fetchPercent" style="font-size: 1.3em; margin-bottom: 10px; font-weight: bold;">0%</div>
        <div style="width: 100%; height: 12px; background: #111; border-radius: 6px; overflow: hidden; border: 1px solid rgba(0,242,255,0.2);">
            <div id="fetchBar" style="width: 0%; height: 100%; background: var(--cyan-glow); box-shadow: 0 0 20px var(--cyan-glow);"></div>
        </div>
    </div>

    <div id="criticalAlert" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(20, 0, 0, 0.98); border: 2px solid var(--alert-red); border-radius: 12px; padding: 40px; width: 90vw; max-width: 420px; text-align: center; z-index: 10000; box-shadow: 0 0 50px var(--alert-red);">
        <div style="font-size: 4em; color: var(--alert-red);">⚠️</div>
        <div style="font-size: 1.8em; color: #fff; font-weight: bold;">TRUY CẬP BỊ CHẶN</div>
        <div style="color: #ff8a8a; font-weight: bold; margin-top: 10px;">TRANG WEB KHÔNG AN TOÀN</div>
    </div>

    <div id="gateway" class="neon-panel">
        <div class="neon-content" style="padding: 40px 30px;">
            <div class="main-header-text">SECURITY GATE</div>
            <p style="font-size: 0.85em; margin-bottom: 25px; color: #aaa; letter-spacing: 2px; text-align: center;">VUI LÒNG XÁC MINH DANH TÍNH</p>
            <input type="text" id="gatewayInput" class="input-box" placeholder="NHẬP MÃ XÁC THỰC" inputmode="text" autocomplete="off">
            <button class="btn-prime" id="gatewayBtn" onclick="checkGateway()">KIỂM TRA MÃ</button>
            <div id="gatewayMsg" style="margin-top: 20px; font-weight: bold; font-size: 1.1em; height: 25px;"></div>
        </div>
    </div>

    <div id="mainDashboard">
        <div class="control-panel neon-panel">
            <div class="neon-content">
                <div class="main-header-text" style="font-size: 1.8em; margin-bottom: 15px;">XÓA MÃ ẨN</div>
                
                <div class="status-box">
                    <div class="status-line"><span style="color: #fff;">TRẠNG THÁI:</span> <span id="stText" style="color: var(--win-green); font-weight: bold;">AN TOÀN</span></div>
                    <div class="status-line"><span style="color: #fff;">RỦI RO:</span> <span id="riskText" style="color: var(--cyan-glow); font-weight: bold;">0%</span></div>
                </div>

                <div id="inputGroup">
                    <input type="text" id="userInp" class="input-box" placeholder="Tên đăng nhập">
                    <input type="text" id="gameInp" class="input-box" placeholder="Tên trang game">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                        <button class="btn-prime action-btn" onclick="runAction('check')">KIỂM TRA</button>
                        <button class="btn-prime action-btn" onclick="runAction('delete')">XÓA MÃ</button>
                    </div>
                </div>

                <div id="serverConnectArea" style="margin-top:20px; border: 1px dashed var(--cyan-glow); padding:18px; text-align:center; cursor:pointer;" onclick="connectServer()">
                    <p id="serverStatusText" style="font-size: 0.8em; letter-spacing: 1px; color: var(--cyan-glow);">KẾT NỐI AN TOÀN</p>
                    <div style="width:100%; height:4px; background:#111; margin-top:10px;"><div id="serverProgressBar" style="width:0%; height:100%; background:var(--cyan-glow); transition: 0.3s;"></div></div>
                </div>

                <div class="device-info-wrapper">
                    <div class="device-box"><span class="dev-label">IP:</span><span id="dev-ip" class="dev-val">...</span></div>
                    <div class="dev-divider"></div>
                    <div class="device-box"><span class="dev-label">TB:</span><span id="dev-tb" class="dev-val">...</span></div>
                    <div class="dev-divider"></div>
                    <div class="device-box"><span class="dev-label">ST:</span><span class="dev-val" style="color: var(--win-green);">ENCRYPTED</span></div>
                </div>
            </div>
        </div>

        <div class="system-logs-container">
            <div class="log-row">
                <div class="log-panel neon-panel"><div class="log-title">LỊCH SỬ KIỂM TRA</div><div class="log-content" id="logBoxCheck"></div></div>
                <div class="log-panel neon-panel"><div class="log-title">LỊCH SỬ XÓA MÃ</div><div class="log-content" id="logBoxDelete"></div></div>
            </div>
            <div class="log-row">
                <div class="log-panel neon-panel"><div class="log-title">CHIẾN THẮNG MỚI NHẤT</div><div class="log-content" id="logBoxMoney"></div></div>
                <div class="log-panel neon-panel"><div class="log-title">HỆ THỐNG LIVE FEED</div><div class="log-content" id="logBoxFeed"></div></div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwkVVTdCvxhVut8xL4NUaK4AtbDEhbq_mFAaTLpIUvlhJPrh5-sqCS4ab-xiMZ_mMiCZQ/exec";
        const GAME_URL = "https://sc88slot8.com/";
        let isLinkActive = true;
        let MANG_2 = JSON.parse(localStorage.getItem('MANG_2_CACHE')) || [];

        function playBeep(freq = 880, duration = 0.1) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        async function syncData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                MANG_2 = data.map(c => c.toString().trim().toUpperCase());
                localStorage.setItem('MANG_2_CACHE', JSON.stringify(MANG_2));
            } catch (e) {}
        }

        window.onload = () => {
            syncData(); setInterval(syncData, 10000);
            document.getElementById('gatewayInput').focus();
            document.getElementById('gatewayInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') { playBeep(440, 0.05); checkGateway(); } });
            getDeviceInfo();
        };

        async function getDeviceInfo() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                document.getElementById('dev-ip').textContent = data.ip;
            } catch(e) { document.getElementById('dev-ip').textContent = "171.240.133.123"; }
            const ua = navigator.userAgent;
            document.getElementById('dev-tb').textContent = ua.includes("Windows") ? "PC-Win" : ua.includes("Android") ? "Android" : ua.includes("iPhone") ? "iPhone" : "Mobile";
        }

        async function checkGateway() {
            const val = document.getElementById('gatewayInput').value.trim().toUpperCase();
            if (!val) return;
            if (MANG_2.includes(val)) {
                playBeep(1000, 0.2);
                document.getElementById('gatewayMsg').style.color = "var(--win-green)";
                document.getElementById('gatewayMsg').textContent = "✓ XÁC THỰC THÀNH CÔNG";
                setTimeout(() => {
                    document.getElementById('gateway').style.display = 'none';
                    document.getElementById('mainDashboard').classList.add('fade-in-active');
                    startMoneyStream(); startLiveFeed(); startSecureLinkTimer();
                }, 500);
                fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "delete", code: val }) });
            } else {
                playBeep(150, 0.3);
                document.getElementById('gatewayBtn').textContent = "ĐANG TÌM KIẾM...";
                await syncData();
                if (MANG_2.includes(val)) checkGateway();
                else { document.getElementById('gatewayMsg').style.color = "var(--alert-red)"; document.getElementById('gatewayMsg').textContent = "✗ MÃ KHÔNG HỢP LỆ"; document.getElementById('gatewayBtn').textContent = "KIỂM TRA MÃ"; }
            }
        }

        async function runAction(mode) {
            const user = document.getElementById('userInp').value.trim();
            const game = document.getElementById('gameInp').value.trim();
            if(!user || !game) return;
            const stText = document.getElementById('stText');
            const riskText = document.getElementById('riskText');
            document.querySelectorAll('.action-btn').forEach(btn => btn.disabled = true);
            const overlay = document.getElementById('fetchingOverlay');
            const fetchLog = document.getElementById('fetchLog');
            fetchLog.innerHTML = ""; overlay.style.display = 'block'; 
            let p = 0;
            const isGameValid = (game.toUpperCase() === "SC88");
            const duration = 8000 + Math.random() * 2000;
            const step = (100 / (duration / 50));
            const iv = setInterval(() => {
                p += step; if (p > 100) p = 100;
                document.getElementById('fetchBar').style.width = p + "%";
                document.getElementById('fetchPercent').textContent = Math.floor(p) + "%";
                if (p < 100 && Math.random() < 0.2) {
                    const l = document.createElement('div');
                    l.textContent = `> ANALYZING SECTOR 0x${Math.floor(Math.random()*0xFFFFFF).toString(16).toUpperCase()}... [OK]`;
                    fetchLog.appendChild(l); fetchLog.scrollTop = fetchLog.scrollHeight;
                }
                if (p >= 100) {
                    clearInterval(iv);
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        const logBox = document.getElementById(mode === 'check' ? 'logBoxCheck' : 'logBoxDelete');
                        const resDiv = document.createElement('div');
                        resDiv.className = 'result-line';
                        if(isGameValid) {
                            stText.textContent = "AN TOÀN"; stText.style.color = "var(--win-green)"; riskText.textContent = "0%";
                            resDiv.classList.add('res-success');
                            resDiv.innerHTML = `<b>${mode==='check'?'KIỂM TRA':'XÓA MÃ'}:</b> ${user}<br>TRẠNG THÁI: ${mode==='check'?'AN TOÀN':'THÀNH CÔNG'}`;
                        } else {
                            stText.textContent = "CẢNH BÁO"; stText.style.color = "var(--alert-red)"; riskText.textContent = "99%";
                            resDiv.classList.add('res-fail');
                            resDiv.innerHTML = `<b>${mode==='check'?'KIỂM TRA':'XÓA MÃ'}:</b> ${user}<br>LỖI: KHÔNG AN TOÀN ĐỐI VỚI ${game}`;
                            document.getElementById('criticalAlert').style.display='block';
                            setTimeout(()=>document.getElementById('criticalAlert').style.display='none',3000);
                        }
                        logBox.prepend(resDiv);
                        if (logBox.children.length > 10) {
                                logBox.removeChild(logBox.lastChild);
                            }
                        document.querySelectorAll('.action-btn').forEach(btn => btn.disabled = false);
                    }, 500);
                }
            }, 50);
        }

        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array.from({length: Math.ceil(window.innerWidth/16)}).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00f2ff"; ctx.font = "16px monospace";
            drops.forEach((y, i) => {
                ctx.fillText("SC88"[Math.floor(Math.random()*4)], i*16, y*16);
                if (y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 35);

        function startSecureLinkTimer() {
            const txt = document.getElementById('serverStatusText');
            txt.innerHTML = "KẾT NỐI AN TOÀN";
            txt.style.color = "var(--cyan-glow)";
            setTimeout(() => {
                txt.style.color = "var(--win-green)"; txt.style.fontWeight = "bold";
                txt.innerHTML = "LINK ĐỀ XUẤT BẢO MẬT CAO<br>(Ấn vào đây)";
                txt.style.animation = "textShine 2s infinite";
            }, 10000);
        }
